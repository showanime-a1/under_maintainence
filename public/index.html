<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
            background-color: black;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;

            /* NEW: background image */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
                        url('https://images4.alphacoders.com/949/thumb-1920-949067.jpg?q=80&w=1920') no-repeat center center/cover;
            
            animation: fadeIn 1.5s ease-in-out;
        }

        /* NEW: fade animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(1.02);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .container {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            z-index: 2;
        }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
            display: inline-block;
        }

        .logo-container {
            margin-bottom: 20px;
            background: none;
        }

        .message h1 {
            font-size: 2.5rem;
            margin: 0;
        }

        .message p {
            font-size: 1.2rem;
            margin: 10px 0 0;
        }

        /* ❄️ Snow container */
        .snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .snowflake {
            position: absolute;
            top: -10px;
            color: white;
            font-size: 10px;
            opacity: 0.8;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

    </style>
</head>
<body>

    <!-- ❄️ Snow Layer -->
    <div class="snow" id="snow"></div>

    <div class="container">
        <div class="logo-container">
            <img src="https://showanime-mdn.netlify.app/image/logo-transparent.png" alt="ShowAnime Logo" class="logo">
        </div>
        <div class="message">
            <h1>We'll be back in few hours!</h1>
            <p>ShowAnime is currently under maintenance.<br>
            Thank you for your patience and understanding.</p>
        </div>
    </div>

    <!-- ❄️ Snow Script -->
    <script>
        const snowContainer = document.getElementById('snow');

        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            snowflake.innerHTML = '•';

            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = (Math.random() * 3 + 2) + 's';
            snowflake.style.opacity = Math.random();

            snowContainer.appendChild(snowflake);

            setTimeout(() => {
                snowflake.remove();
            }, 5000);
        }

        setInterval(createSnowflake, 100);
    </script>

</body>
</html>
